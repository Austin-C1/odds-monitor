# 应用配置
spring.application.name=odds-monitor-backend

# 数据源配置，默认通过环境变量提供
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

# JPA 配置
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway 配置
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# 服务端口
server.port=${SERVER_PORT:18000}

# 默认使用 dev，可通过环境变量切换
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 日志配置
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.wrbug.polymarketbot=${LOG_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Polymarket API 地址在代码常量中维护

# Builder Relayer 配置用于 Gasless 交易
# Builder API Key、Secret、Passphrase 通过系统设置页配置，存储在数据库中
# 未配置时使用手动发送交易方式

# 跟单轮询配置
copy.trading.polling.interval=${COPY_TRADING_POLLING_INTERVAL:2000}
copy.trading.polling.enabled=${COPY_TRADING_POLLING_ENABLED:false}

# 跟单链上 WebSocket 配置
copy.trading.onchain.ws.reconnect.delay=${COPY_TRADING_ONCHAIN_WS_RECONNECT_DELAY:3000}

# Telegram 订单成功通知最小金额过滤，设为 0 可关闭过滤
telegram.order-notification.min-amount-usdc=${TELEGRAM_ORDER_NOTIFICATION_MIN_AMOUNT_USDC:10}

# WebSocket 配置
websocket.heartbeat-timeout=${WEBSOCKET_HEARTBEAT_TIMEOUT:60000}

# Pinnacle 浏览器模式。PBBall 流程使用正常浏览器更稳定
pinnacle.browser.headless=${PINNACLE_BROWSER_HEADLESS:false}

# JWT 配置
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000
jwt.refresh-threshold=86400000

# 加密配置，用于私钥等敏感数据；未设置时默认使用 jwt.secret
encryption.key=${ENCRYPTION_KEY}

# 管理员重置密码配置
admin.reset-password.key=${ADMIN_RESET_PASSWORD_KEY}

# 频率限制配置
rate-limit.reset-password.max-attempts=3
rate-limit.reset-password.window-seconds=60

# 公告功能使用本地静态内容
